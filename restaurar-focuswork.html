<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurar FocusWork</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0f1117; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1a1d2e; border-radius: 16px; padding: 30px; max-width: 420px; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
h1 { font-size: 24px; margin-bottom: 8px; }
p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-secondary { background: rgba(255,255,255,0.1); color: white; }
.btn:disabled { opacity: 0.4; }
.status { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 14px; display: none; line-height: 1.6; white-space: pre-line; }
.ok { background: rgba(76,175,80,0.2); color: #4CAF50; border: 1px solid rgba(76,175,80,0.3); }
.error { background: rgba(244,67,54,0.2); color: #f44336; border: 1px solid rgba(244,67,54,0.3); }
.info { background: rgba(33,150,243,0.2); color: #2196F3; border: 1px solid rgba(33,150,243,0.3); }
.client-info { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px; margin-bottom: 16px; text-align: left; display: none; }
.cname { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
.cdetail { font-size: 12px; color: rgba(255,255,255,0.5); }
input[type=file] { display: none; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:16px">🔧</div>
  <h1>Restaurar FocusWork</h1>
  <p>Reconstrueix les dades locals (IndexedDB) a partir d'un fitxer de backup JSON.</p>
  <div class="client-info" id="ci">
    <div class="cname" id="cn"></div>
    <div class="cdetail" id="cd"></div>
  </div>
  <input type="file" id="fi" accept=".json">
  <button class="btn btn-primary" onclick="document.getElementById('fi').click()">📂 Seleccionar fitxer JSON</button>
  <button class="btn btn-secondary" id="br" onclick="restore()" style="display:none">✅ Restaurar a IndexedDB</button>
  <div class="status" id="st"></div>
</div>
<script>
var pd = null;
document.getElementById('fi').onchange = function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      pd = JSON.parse(ev.target.result);
      if (!pd.client) { show('error','Format no valid'); return; }
      var c = pd.client;
      var h = Math.floor((c.total||0)/3600);
      var m = Math.floor(((c.total||0)%3600)/60);
      document.getElementById('cn').textContent = c.name || 'Sense nom';
      document.getElementById('cd').textContent = 'Temps: '+h+'h '+m+'m  |  '+( c.stateLabel||c.state||'-');
      document.getElementById('ci').style.display = 'block';
      document.getElementById('br').style.display = 'block';
      show('info','Backup llegit: '+file.name);
    } catch(err) { show('error','Error: '+err.message); }
  };
  r.readAsText(file);
};

function restore() {
  if (!pd || !pd.client) { show('error','No hi ha dades'); return; }
  var btn = document.getElementById('br');
  btn.disabled = true;
  show('info','Obrint IndexedDB...');
  var c = pd.client;
  var cc = {
    id: c.id, name: c.name||'', email: c.email||null, phone: c.phone||null,
    company: c.company||null, notes: c.notes||null,
    status: c.active ? 'active' : 'closed', active: c.active !== false,
    total: c.total||0, billableTime: c.billableTime||0,
    activities: c.activities||{}, tasks: c.tasks||{},
    state: c.state||'in_progress', stateLabel: c.stateLabel||'',
    stateIcon: c.stateIcon||'', stateColor: c.stateColor||'',
    stateHistory: c.stateHistory||[], progress: c.progress||0,
    progressLabel: c.progressLabel||'', progressPercent: c.progressPercent||0,
    progressColor: c.progressColor||'', progressUpdatedAt: c.progressUpdatedAt||null,
    stateUpdatedAt: c.stateUpdatedAt||null, deliveryDate: c.deliveryDate||null,
    delivery_date: c.deliveryDate||null, extraHours: c.extraHours||[],
    photos: [], files: c.files||[], createdAt: c.createdAt||Date.now(),
    created_at: c.createdAt ? new Date(c.createdAt).toISOString() : new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  var r0 = indexedDB.open('FocusWorkDB');
  r0.onsuccess = function(e) {
    var cv = e.target.result.version;
    e.target.result.close();
    var tv = Math.max(cv, 2);
    var req = indexedDB.open('FocusWorkDB', tv);
    req.onupgradeneeded = function(ev) {
      var db = ev.target.result;
      if (!db.objectStoreNames.contains('photos')) {
        var ps = db.createObjectStore('photos',{keyPath:'id'});
        ps.createIndex('clientId','clientId',{unique:false});
        ps.createIndex('date','date',{unique:false});
      }
      if (!db.objectStoreNames.contains('clients')) {
        db.createObjectStore('clients',{keyPath:'id'});
      }
      if (!db.objectStoreNames.contains('state')) {
        db.createObjectStore('state',{keyPath:'id'});
      }
    };
    req.onsuccess = function(ev) {
      var db = ev.target.result;
      show('info','Guardant client...');
      var tx = db.transaction(['clients','state'],'readwrite');
      tx.objectStore('clients').put(cc);
      tx.objectStore('state').put({id:'main',data:{currentClientId:null},timestamp:Date.now()});
      tx.oncomplete = function() {
        db.close();
        show('ok','Client "'+c.name+'" restaurat!\n\nAra torna a l\'app FocusWork i prem el boto groc:\n"Accedir sense connexio (dades locals)"');
        btn.style.display = 'none';
      };
      tx.onerror = function() {
        db.close();
        show('error','Error guardant: '+tx.error);
        btn.disabled = false;
      };
    };
    req.onerror = function() { show('error','Error IDB: '+req.error); btn.disabled=false; };
  };
  r0.onerror = function() { show('error','Error obrint IDB: '+r0.error); btn.disabled=false; };
}

function show(type, msg) {
  var el = document.getElementById('st');
  el.className = 'status '+type;
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
